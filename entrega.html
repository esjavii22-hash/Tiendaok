<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DSOK · Entrega</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #080808;
  color: #f2f1ed;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  background: #d4ff00;
  padding: 16px 20px 14px;
}
.header-tag {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #080808;
  font-weight: 700;
  margin-bottom: 2px;
}
.header-nombre {
  font-size: 26px;
  font-weight: 800;
  color: #080808;
  letter-spacing: -0.5px;
  line-height: 1;
}

.card {
  margin: 12px 16px 0;
  background: #141414;
  border-radius: 14px;
  overflow: hidden;
}
.card-row {
  padding: 14px 16px;
  border-bottom: 1px solid #1e1e1e;
}
.card-row:last-child { border-bottom: none; }
.card-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #555;
  margin-bottom: 4px;
}
.card-value {
  font-size: 15px;
  color: #f2f1ed;
  font-weight: 500;
  line-height: 1.4;
}
.card-value.accent {
  font-size: 22px;
  color: #d4ff00;
  font-weight: 700;
}

.btns {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: auto;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 16px;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.97); opacity: 0.9; }

.btn-wsp { background: #25D366; color: #fff; }
.btn-maps { background: #1a73e8; color: #fff; }

.btn svg { flex-shrink: 0; }

.footer {
  text-align: center;
  padding: 14px 16px 24px;
  font-size: 11px;
  color: #333;
}

.no-data {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  padding: 3rem 2rem;
  text-align: center;
  color: #555;
}
.no-data-icon { font-size: 48px; margin-bottom: 1rem; }
</style>
</head>
<body>

<div id="app"></div>

<script>
function getParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    nombre: p.get('nombre') || '',
    tel:    p.get('tel')    || '',
    dir:    p.get('dir')    || '',
    zona:   p.get('zona')   || '',
    total:  p.get('total')  || '',
    prod:   p.get('prod')   || '',
    nro:    p.get('nro')    || '',
    nvl:    p.get('nvl')    || '',
  };
}

function formatTotal(t) {
  if (!t) return '';
  const n = Number(t.toString().replace(/\./g, '').replace(',', '.'));
  if (isNaN(n)) return t;
  return '$' + n.toLocaleString('es-AR');
}

function render() {
  const d = getParams();
  const app = document.getElementById('app');

  if (!d.tel && !d.dir) {
    app.innerHTML = `
      <div class="no-data">
        <div class="no-data-icon">📦</div>
        <p style="font-size:16px;color:#666;margin-bottom:8px">Sin datos de entrega</p>
        <p style="font-size:13px;color:#333">Escaneá el QR de la etiqueta para ver la info del pedido.</p>
      </div>`;
    return;
  }

  const wspUrl  = d.tel ? `https://wa.me/${d.tel}` : null;
  const mapsUrl = d.dir ? `https://maps.google.com/?q=${encodeURIComponent(d.dir + (d.zona ? ', ' + d.zona : '') + ', Argentina')}` : null;

  app.innerHTML = `
    <div class="header">
      <p class="header-tag">DSOK · Entrega${d.nro ? ' · #' + d.nro : ''}</p>
      <p class="header-nombre">${d.nombre || 'Cliente'}</p>
    </div>

    <div class="card">
      ${d.dir ? `
      <div class="card-row">
        <p class="card-label">Dirección</p>
        <p class="card-value">${d.dir}</p>
        ${d.zona ? `<p style="font-size:12px;color:#555;margin-top:3px">${d.zona}</p>` : ''}
      </div>` : ''}

      ${d.nvl ? `
      <div class="card-row">
        <p class="card-label">Aclaración</p>
        <p class="card-value" style="color:#aaa;font-size:14px">${d.nvl}</p>
      </div>` : ''}

      ${d.prod ? `
      <div class="card-row">
        <p class="card-label">Pedido</p>
        <p class="card-value" style="font-size:13px;color:#aaa">${d.prod}</p>
      </div>` : ''}

      ${d.total ? `
      <div class="card-row">
        <p class="card-label">Cobrar</p>
        <p class="card-value accent">${formatTotal(d.total)}</p>
      </div>` : ''}
    </div>

    <div class="btns">
      ${wspUrl ? `
      <a href="${wspUrl}" class="btn btn-wsp">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Contactar cliente
      </a>` : ''}

      ${mapsUrl ? `
      <a href="${mapsUrl}" class="btn btn-maps">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
        Abrir en Google Maps
      </a>` : ''}
    </div>

    <div class="footer">DSOK Importado · Sin pago online · Pagás al recibir</div>
  `;
}

render();
</script>
</body>
</html>
